<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tải tài liệu lên</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-lg border border-gray-100">
        <div class="text-center mb-8">
            <div class="inline-block bg-green-100 text-green-600 p-4 rounded-full text-3xl mb-4">
                <i class="fa-solid fa-cloud-arrow-up"></i>
            </div>
            <h2 class="text-2xl font-bold text-gray-800">Tải tài liệu lên</h2>
            <p class="text-sm text-gray-400">Chọn nhiều tệp tin để chia sẻ ngay</p>
        </div>
        
        <form action="/upload" method="POST" enctype="multipart/form-data" class="space-y-6">
            <div class="border-2 border-dashed border-gray-300 rounded-2xl p-8 text-center hover:border-blue-500 transition cursor-pointer">
                <input type="file" name="files" multiple required class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                <p class="text-xs text-gray-400 mt-2">Hỗ trợ PDF, DOCX, Hình ảnh...</p>
            </div>
            
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-xl font-bold transition shadow-md hover:shadow-blue-200">
                <i class="fa-solid fa-upload mr-2"></i> Tải lên hệ thống
            </button>
        </form>
        
        <div class="mt-6 text-center">
            <a href="/" class="text-sm text-gray-400 hover:text-gray-600 font-medium">
                <i class="fa-solid fa-arrow-left mr-1"></i> Quay lại trang chủ
            </a>
        </div>
    </div>

</body>
</html>
