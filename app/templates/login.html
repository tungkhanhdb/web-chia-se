<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - Hệ Thống Chia Sẻ Tài Liệu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 h-screen flex flex-col items-center justify-center px-4">
    
    <div class="bg-white p-8 rounded-2xl shadow-md w-full max-w-md border border-gray-100">
        <div class="text-center mb-8">
            <div class="inline-block bg-blue-100 text-blue-600 p-3 rounded-full text-2xl mb-3">
                <i class="fa-solid fa-graduation-cap"></i>
            </div>
            <h2 class="text-2xl font-bold text-gray-800">Đăng Nhập Hệ Thống</h2>
            <p class="text-xs text-gray-400 mt-1">Vui lòng nhập tài khoản sinh viên/giảng viên</p>
        </div>
        
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="p-3 mb-4 text-xs text-red-700 bg-red-100 rounded-lg text-center">
                {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}
        
        <form action="/login" method="POST" class="space-y-5">
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Tên đăng nhập / Email</label>
                <div class="flex items-center bg-gray-50 border rounded-xl px-3 py-2.5 focus-within:border-blue-500 transition">
                    <i class="fa-solid fa-user text-gray-400 mr-2 text-sm"></i>
                    <input type="text" name="username" placeholder="Nhập tài khoản..." class="bg-transparent w-full focus:outline-none text-sm text-gray-700">
                </div>
            </div>
            
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Mật khẩu</label>
                <div class="flex items-center bg-gray-50 border rounded-xl px-3 py-2.5 focus-within:border-blue-500 transition">
                    <i class="fa-solid fa-lock text-gray-400 mr-2 text-sm"></i>
                    <input type="password" name="password" placeholder="••••••••" class="bg-transparent w-full focus:outline-none text-sm text-gray-700">
                </div>
            </div>
            
            <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition shadow-md shadow-blue-200 text-sm">
                Đăng Nhập
            </button>
        </form>
        
        <div class="mt-6 pt-4 border-t border-gray-100 text-center space-y-2">
            <p class="text-xs text-gray-500">Chưa có tài khoản? <a href="/register" class="text-blue-600 font-semibold hover:underline">Đăng ký ngay</a></p>
            <a href="/" class="block text-xs text-gray-400 hover:text-gray-600"><i class="fa-solid fa-arrow-left text-[10px] mr-1"></i> Quay lại trang chủ</a>
        </div>
    </div>

</body>
</html>
