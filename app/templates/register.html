<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký Tài Khoản - Hệ Thống</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 h-screen flex flex-col items-center justify-center px-4">
    
    <div class="bg-white p-8 rounded-2xl shadow-md w-full max-w-md border border-gray-100">
        <div class="text-center mb-6">
            <div class="inline-block bg-blue-100 text-blue-600 p-3 rounded-full text-2xl mb-3">
                <i class="fa-solid fa-user-plus"></i>
            </div>
            <h2 class="text-2xl font-bold text-gray-800">Tạo Tài Khoản Mới</h2>
            <p class="text-xs text-gray-400 mt-1">Đăng ký để tải và chia sẻ tài liệu học tập</p>
        </div>
        
        <form action="/register" method="POST" class="space-y-4">
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Họ và tên</label>
                <input type="text" name="fullname" placeholder="Nguyễn Văn A" class="w-full px-3 py-2 bg-gray-50 border rounded-xl focus:outline-none focus:border-blue-500 text-sm">
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Tên đăng nhập</label>
                <input type="text" name="username" placeholder="username123" class="w-full px-3 py-2 bg-gray-50 border rounded-xl focus:outline-none focus:border-blue-500 text-sm">
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Mật khẩu</label>
                <input type="password" name="password" placeholder="••••••••" class="w-full px-3 py-2 bg-gray-50 border rounded-xl focus:outline-none focus:border-blue-500 text-sm">
            </div>
            
            <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition shadow-md text-sm mt-2">
                Đăng Ký Tài Khoản
            </button>
        </form>
        
        <div class="mt-6 pt-4 border-t border-gray-100 text-center">
            <p class="text-xs text-gray-500">Đã có tài khoản? <a href="/login" class="text-blue-600 font-semibold hover:underline">Đăng nhập</a></p>
        </div>
    </div>

</body>
</html>
